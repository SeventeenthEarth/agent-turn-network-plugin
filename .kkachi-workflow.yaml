gates:
  - id: "blue-red-plan-vet-required"
    requires: ["plan", "vet"]
  - id: "plugin-control-dependency-gate-required"
    requires: ["sot", "plan", "verify"]
  - id: "development-spine-required"
    requires: ["implement", "enhance-test", "ai-slop-cleaner", "optimize", "docs-update", "verify"]
  - id: "color-review-convergence-required"
    requires: ["color-review", "color-adjust"]
  - id: "glm-octo-one-time-required"
    requires: ["octo-review", "octo-adjudication", "post-octo-adjust"]
  - id: "codegraph-refresh-required"
    requires: ["intake", "final"]
    final_required: true
    checks:
      - type: "markdown.field"
        name: "codegraph_evidence_status"
        path: "final-report.md"
        field: "Status"
        one_of: ["complete"]
      - type: "text.contains_all"
        name: "codegraph_evidence_command"
        path: "final-report.md"
        tokens: ["codegraph index", "codegraph init -i"]
  - id: "runtime-ignore-required"
    requires: ["intake", "final"]
    final_required: true
    checks:
      - type: "text.contains_all"
        name: "runtime_dirs_ignored"
        path: "final-report.md"
        tokens: [".kkachi/", ".codegraph/", ".omx/", ".omc/", ".claude-octopus/"]
  - id: "precommit-template-required"
    requires: ["final"]
